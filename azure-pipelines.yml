trigger:
- main

resources:
- repo: self

parameters:
- name: tag
  default: '$(Build.BuildId)'

- name: imageName
  default: 'test-page'

stages:
- stage: CICD
  displayName: CICD Workflow

  jobs:
  - job: Build
    displayName: Build
    pool: local-agent

    steps:
    - task: Docker@2
      displayName: Build an image
      inputs:
        repository: ${{ parameters.imageName }}
        command: build
        dockerfile: '**/Dockerfile'
        tags: ${{ parameters.tag }}
        containerRegistry: registryConnectionTestPage

    - task: Docker@2
      displayName: Push to ACR
      inputs:
        command: push
        containerRegistry: registryConnectionTestPage
        repository: ${{ parameters.imageName }}
        tags: ${{ parameters.tag }}

  - job: Deploy
    displayName: Deploy
    dependsOn: Build
    pool: local-agent

    steps:
    - task: AzureContainerApps@1
      displayName: Deploy to Azure Container Apps
      inputs:
        azureSubscription: appDeployConnectionTestPage
        imageToDeploy: acrtestpagedm.azurecr.io/${{ parameters.imageName }}:${{ parameters.tag }}
        containerAppName: test-page
        resourceGroup: 'kube'