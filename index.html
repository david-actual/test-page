<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Página de prueba para un pipeline CI/CD con Azure DevOps."
    >

    <title>Prueba de CI/CD en Azure DevOps</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family:
                Inter,
                system-ui,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
            color: #ffffff;
            background:
                radial-gradient(
                    circle at 20% 20%,
                    rgba(0, 255, 200, 0.18),
                    transparent 30%
                ),
                radial-gradient(
                    circle at 80% 30%,
                    rgba(124, 58, 237, 0.25),
                    transparent 35%
                ),
                radial-gradient(
                    circle at 50% 80%,
                    rgba(14, 165, 233, 0.20),
                    transparent 35%
                ),
                linear-gradient(
                    135deg,
                    #07111f,
                    #101b35 50%,
                    #120d2d
                );
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            opacity: 0.25;
            pointer-events: none;
            background-image:
                linear-gradient(
                    rgba(255, 255, 255, 0.04) 1px,
                    transparent 1px
                ),
                linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0.04) 1px,
                    transparent 1px
                );
            background-size: 40px 40px;
        }

        .aurora {
            position: fixed;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.42;
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }

        .aurora-one {
            top: -120px;
            left: -90px;
            background: linear-gradient(
                135deg,
                #22d3ee,
                #34d399
            );
        }

        .aurora-two {
            right: -100px;
            bottom: -140px;
            background: linear-gradient(
                135deg,
                #8b5cf6,
                #ec4899
            );
            animation-delay: -4s;
        }

        .page {
            position: relative;
            z-index: 1;
            display: grid;
            place-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            width: min(760px, 100%);
            padding: clamp(32px, 7vw, 72px);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 28px;
            background: rgba(8, 18, 38, 0.56);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.38),
                inset 0 1px 0 rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            padding: 8px 14px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: 1px solid rgba(125, 211, 252, 0.30);
            border-radius: 999px;
            color: #bae6fd;
            background: rgba(14, 165, 233, 0.10);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #34d399;
            box-shadow: 0 0 16px #34d399;
        }

        h1 {
            max-width: 680px;
            margin: 0 auto;
            font-size: clamp(2.3rem, 7vw, 5.2rem);
            line-height: 1.02;
            letter-spacing: -0.055em;
            background: linear-gradient(
                90deg,
                #ffffff,
                #67e8f9,
                #c4b5fd,
                #ffffff
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 7s linear infinite;
        }

        .subtitle {
            margin-top: 24px;
            font-size: clamp(1.1rem, 3vw, 1.45rem);
            color: #cbd5e1;
        }

        .subtitle strong {
            color: #ffffff;
        }

        .description {
            max-width: 540px;
            margin: 22px auto 0;
            font-size: 1rem;
            line-height: 1.7;
            color: #94a3b8;
        }

        .technologies {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 32px;
        }

        .technology {
            padding: 9px 14px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.06);
        }

        footer {
            margin-top: 38px;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            color: #64748b;
        }

        @keyframes float {
            0%,
            100% {
                transform: translate3d(0, 0, 0) scale(1);
            }

            50% {
                transform: translate3d(30px, 22px, 0) scale(1.08);
            }
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        @media (max-width: 600px) {
            body {
                overflow-y: auto;
            }

            .card {
                border-radius: 22px;
            }

            .description {
                font-size: 0.95rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>

<body>
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>

    <main class="page">
        <section class="card">
            <div class="badge">
                <span class="status-dot"></span>
                Pipeline Demo
            </div>

            <h1>Prueba de CI/CD en AzureDevops</h1>

            <p class="subtitle">
                by <strong>David Morales</strong>
            </p>

            <p class="description">
                Aplicación web estática desplegada mediante un proceso
                de integración y entrega continua.
            </p>

            <div class="technologies">
                <span class="technology">GitHub</span>
                <span class="technology">Azure DevOps</span>
                <span class="technology">Docker</span>
                <span class="technology">Nginx</span>
                <span class="technology">Azure Container Registry</span>
            </div>

            <footer>
                CI/CD Practice Lab
            </footer>
        </section>
    </main>
</body>
</html>
